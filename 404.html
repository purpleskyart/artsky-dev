    <meta name="theme-color" content="#0f0f1a" />
    <script>
      (function(){
        var t = localStorage.getItem('artsky-theme');
        var resolved = 'dark';
        if (t === 'light') resolved = 'light';
        else if (t === 'system' && typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) resolved = 'light';
        else if (t === 'dark') resolved = 'dark';
        document.documentElement.setAttribute('data-theme', resolved);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) {
          var c = resolved === 'light' ? '#fdf6f9' : '#0f0f1a';
          meta.setAttribute('content', c);
        }
      })();
    </script>
    <script>
      /* iOS home-screen PWAs report env(safe-area-inset-top) as 0 — set --app-safe-* before first paint. */
      (function () {
        var html = document.documentElement
        var mq = typeof window.matchMedia === 'function' && window.matchMedia('(display-mode: standalone)')
        var standalone =
          (window.navigator && window.navigator.standalone === true) || (mq && mq.matches)
        if (standalone) html.setAttribute('data-standalone-pwa', '')

        function measure() {
          var el = document.createElement('div')
          el.style.cssText =
            'position:fixed;top:0;left:0;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);visibility:hidden;pointer-events:none;'
          html.appendChild(el)
          var cs = getComputedStyle(el)
          var top = parseFloat(cs.paddingTop) || 0
          var right = parseFloat(cs.paddingRight) || 0
          var bottom = parseFloat(cs.paddingBottom) || 0
          var left = parseFloat(cs.paddingLeft) || 0
          html.removeChild(el)

          var ios = /iPhone|iPad|iPod/.test(navigator.userAgent || '')
          var minSide = Math.min(screen.width, screen.height)
          var maxSide = Math.max(screen.width, screen.height)
          if (ios && standalone && top < 20) {
            if (minSide >= 768) top = 24
            else if (minSide >= 393) top = 59
            else if (maxSide >= 812) top = 47
            else top = 20
          }
          if (ios && standalone && bottom < 20) {
            if (maxSide >= 812 && minSide >= 375) bottom = 34
          }

          html.style.setProperty('--app-safe-top', top + 'px')
          html.style.setProperty('--app-safe-right', right + 'px')
          html.style.setProperty('--app-safe-bottom', bottom + 'px')
          html.style.setProperty('--app-safe-left', left + 'px')
        }

        measure()
        if (standalone) {
          window.addEventListener('orientationchange', function () {
            setTimeout(measure, 100)
          })
        }
      })()
    </script>

      /* Theme background and color-scheme so Safari top/status bar and bottom safe area match theme */
      html[data-theme="light"] { color-scheme: light; }
      html[data-theme="dark"] { color-scheme: dark; }
      html[data-theme="light"] body { background: #fdf6f9; color: #141414; }
      html[data-theme="dark"] body, body { background: #0f0f1a; color: #e8e8f0; }
